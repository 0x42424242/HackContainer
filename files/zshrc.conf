# Compilation flags
# export ARCHFLAGS="-arch x86_64"

# Set personal aliases, overriding those provided by oh-my-zsh libs,
# plugins, and themes. Aliases can be placed here, though oh-my-zsh
# users are encouraged to define aliases within the ZSH_CUSTOM folder.
# For a full list of active aliases, run `alias`.
#
# Example aliases
# alias zshconfig="mate ~/.zshrc"
# alias ohmyzsh="mate ~/.oh-my-zsh"

PROMPT='%{$fg_bold[red]%}hackbox %{$fg_bold[green]%}%p %{$fg[cyan]%}%c %{$fg_bold[blue]%}$(git_prompt_info)%{$fg_bold[blue]%} % %{$reset_color%}'

ZSH_THEME_GIT_PROMPT_PREFIX="git:(%{$fg[red]%}"
ZSH_THEME_GIT_PROMPT_SUFFIX="%{$reset_color%}"
ZSH_THEME_GIT_PROMPT_DIRTY="%{$fg[blue]%}) %{$fg[yellow]%}✗%{$reset_color%}"
ZSH_THEME_GIT_PROMPT_CLEAN="%{$fg[blue]%})"

export CLAUDE_CONFIG_DIR=/root/.claude

alias tmux="tmux -2"

ffuf_all() {
  mkdir -p all
  xargs -P5 -I {} sh -c 'dom=$(echo {} | unfurl format %s%d); ffuf -c -u {}/FUZZ -w /usr/wordlists/SecLists/Discovery/Web-Content/directory-list-2.3-medium.txt -mc all -ac -rate 200 -o all/all_$dom.csv -of csv -maxtime 600 -v' < $1
}

ffuf_dirs() {
  sh -c "dom=$(echo \"$1\" | unfurl format %s%d); echo $dom; ffuf -c -u $1/FUZZ -w /usr/wordlists/SecLists/Discovery/Web-Content/directory-list-2.3-medium.txt -mc all -ac -rate 200 -o dirs_$dom.csv -of csv -maxtime 600 -v"
}

# Usage: ffuf_recursive https://foo.com /usr/wordlists/SecLists/Discovery/Web-Content/directory-list-2.3-medium.txt -fc=404
ffuf_recursive() {
  mkdir -p recursive
  dom=$(echo $1 | unfurl format %s%d)
  ffuf -c -v -u $1/FUZZ -w $2 \
  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:86.0) Gecko/20100101 Firefox/86.0" \
  -recursion -recursion-depth 5 \
  -mc all -ac \
  -rate 200 \
  -o recursive/recursive_$dom.csv -of csv $3
}

ffuf_cols() {
  find -name "*.csv" | xargs cat \
  | cut -d, -f2,4- | awk -F, '$3==200' \
  | awk -F, 'BEGIN { OFS=FS }; { $1=substr($1, 1, 110); print }' \
  | sort -t, -k 4,4 -n -u | column -s, -t | vim -
}

discover_cms() {
  for i in $(ls /usr/wordlists/SecLists/Discovery/Web-Content/CMS/); do ffuf -c -u $1/FUZZ -w /usr/wordlists/SecLists/Discovery/Web-Content/CMS/$i -rate 200 -fc 301; done
}

discover_cms_unlimited() {
  for i in $(ls /usr/wordlists/SecLists/Discovery/Web-Content/CMS/); do ffuf -c -u $1/FUZZ -w /usr/wordlists/SecLists/Discovery/Web-Content/CMS/$i -fc 301; done
}